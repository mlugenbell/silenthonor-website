<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Login — Silent Honor Foundation</title>
<link rel="stylesheet" href="css/global.css">
<style>
.login-wrapper {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  padding-top: 100px;
  position: relative;
  z-index: 1;
}

.login-card {
  background: rgba(17, 24, 39, 0.95);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 3rem;
  max-width: 420px;
  width: 100%;
}

.login-logo {
  display: flex;
  justify-content: center;
  margin-bottom: 2rem;
}

.login-logo img {
  height: 80px;
  width: auto;
}

.login-title {
  font-family: 'Oswald', sans-serif;
  font-size: 1.6rem;
  font-weight: 700;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 0.5rem;
}

.login-subtitle {
  font-family: 'Lora', serif;
  font-size: 0.9rem;
  font-style: italic;
  color: var(--muted);
  text-align: center;
  margin-bottom: 2rem;
}

.form-group {
  margin-bottom: 1.25rem;
}

.form-label {
  display: block;
  font-family: 'Oswald', sans-serif;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.5rem;
}

.form-input {
  width: 100%;
  background: var(--navy);
  border: 1px solid var(--border);
  color: var(--white);
  padding: 0.9rem 1rem;
  font-size: 0.95rem;
  transition: border-color 0.2s;
}

.form-input:focus {
  outline: none;
  border-color: var(--red);
}

.password-wrapper {
  position: relative;
}

.password-toggle {
  position: absolute;
  right: 1rem;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--muted);
  font-size: 0.7rem;
  font-family: 'Oswald', sans-serif;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
}

.login-btn {
  width: 100%;
  background: var(--red);
  color: var(--white);
  font-family: 'Oswald', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 1rem;
  border: none;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 0.5rem;
}

.login-btn:hover {
  background: var(--red-light);
}

.login-btn:disabled {
  opacity: 0.7;
  cursor: not-allowed;
}

.error-msg {
  background: rgba(185, 28, 28, 0.1);
  border: 1px solid rgba(185, 28, 28, 0.3);
  color: var(--red-light);
  padding: 0.8rem 1rem;
  font-size: 0.85rem;
  margin-bottom: 1rem;
  display: none;
}

.error-msg.show {
  display: block;
}

.login-footer {
  text-align: center;
  margin-top: 1.5rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
}

.login-footer-text {
  font-size: 0.85rem;
  color: var(--muted);
}

.login-footer-link {
  color: var(--red-light);
  text-decoration: none;
}

.login-footer-link:hover {
  text-decoration: underline;
}

.forgot-link {
  display: block;
  text-align: right;
  font-size: 0.75rem;
  color: var(--muted);
  margin-top: 0.5rem;
}

.forgot-link:hover {
  color: var(--white);
}
</style>
</head>
<body>
<div class="topo-bg"><svg xmlns="http://www.w3.org/2000/svg"></svg></div>
<div id="nav-placeholder"></div>

<div class="login-wrapper page-content">
  <div class="login-card">
    <div class="login-logo">
      <img src="https://customer-assets.emergentagent.com/job_build-launch-21/artifacts/ejw735ko_a597f541-5826-493e-8e3d-af5702609fa5.tmp" alt="Silent Honor Foundation">
    </div>
    
    <h1 class="login-title">Member Login</h1>
    <p class="login-subtitle">Access your dashboard, courses, and resources.</p>

    <div class="error-msg" id="error-msg"></div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="login-email" class="form-input" placeholder="you@email.com" data-testid="login-email">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="password-wrapper">
        <input type="password" id="login-password" class="form-input" placeholder="Your password" data-testid="login-password">
        <button class="password-toggle" onclick="togglePassword()">Show</button>
      </div>
      <a href="#" class="forgot-link">Forgot password?</a>
    </div>

    <button class="login-btn" onclick="handleLogin()" data-testid="login-submit-btn">Sign In →</button>

    <div class="login-footer">
      <p class="login-footer-text">
        Don't have an account? <a href="signup.html" class="login-footer-link">Join free</a>
      </p>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="js/components.js"></script>
<script src="js/main.js"></script>
<script>
function togglePassword() {
  const input = document.getElementById('login-password');
  const btn = document.querySelector('.password-toggle');
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = 'Hide';
  } else {
    input.type = 'password';
    btn.textContent = 'Show';
  }
}

async function handleLogin() {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-password').value;
  const errorEl = document.getElementById('error-msg');
  
  if (!email || !pass) {
    errorEl.textContent = 'Please enter both email and password.';
    errorEl.classList.add('show');
    return;
  }

  const loginBtn = document.querySelector('.login-btn');
  loginBtn.textContent = 'Signing In...';
  loginBtn.disabled = true;

  try {
    const response = await fetch(`${window.API_BASE}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'include',
      body: JSON.stringify({ email, password: pass })
    });

    const data = await response.json();

    if (response.ok) {
      localStorage.setItem('sh_user', JSON.stringify(data));
      
      if (data.role === 'admin') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    } else {
      errorEl.textContent = data.detail || 'Invalid email or password.';
      errorEl.classList.add('show');
      loginBtn.textContent = 'Sign In →';
      loginBtn.disabled = false;
    }
  } catch (err) {
    errorEl.textContent = 'Connection error. Please try again.';
    errorEl.classList.add('show');
    loginBtn.textContent = 'Sign In →';
    loginBtn.disabled = false;
  }
}

// Check if already logged in
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const response = await fetch(`${window.API_BASE}/api/auth/me`, {
      credentials: 'include'
    });
    if (response.ok) {
      const user = await response.json();
      if (user.role === 'admin') {
        window.location.href = 'admin.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    }
  } catch (e) {}
});

document.getElementById('login-password').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
