<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Dashboard — Silent Honor Foundation</title>
<link rel="stylesheet" href="css/global.css">
<style>
.redirect-wrapper {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  position: relative;
  z-index: 1;
}

.redirect-card {
  background: rgba(17, 24, 39, 0.95);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 3rem;
  max-width: 500px;
  width: 100%;
  text-align: center;
}

.redirect-logo {
  margin-bottom: 2rem;
}

.redirect-logo img {
  height: 80px;
  width: auto;
}

.redirect-title {
  font-family: 'Oswald', sans-serif;
  font-size: 1.5rem;
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.redirect-text {
  font-family: 'Lora', serif;
  font-size: 0.95rem;
  color: var(--muted);
  line-height: 1.7;
  margin-bottom: 2rem;
}

.redirect-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 1s linear infinite;
  margin: 0 auto 1.5rem;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.redirect-manual {
  font-size: 0.85rem;
  color: var(--muted);
}

.redirect-manual a {
  color: var(--red-light);
  text-decoration: none;
}

.redirect-manual a:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
<div class="topo-bg"><svg xmlns="http://www.w3.org/2000/svg"></svg></div>

<div class="redirect-wrapper">
  <div class="redirect-card">
    <div class="redirect-logo">
      <img src="https://customer-assets.emergentagent.com/job_build-launch-21/artifacts/2vfeeiof_image.png" alt="Silent Honor Foundation">
    </div>
    
    <div class="redirect-spinner"></div>
    
    <h1 class="redirect-title">Redirecting to Member Portal</h1>
    <p class="redirect-text">Taking you to your member dashboard where you can access courses, track progress, and connect with the community.</p>
    
    <p class="redirect-manual">
      Not redirecting? <a href="https://app.clientclub.net/login/1536RWoNvoGBX0aNtJE8" target="_blank" id="manual-link">Click here to go manually</a>
    </p>
  </div>
</div>

<script src="js/components.js"></script>
<script src="js/main.js"></script>
<script>
// Redirect to GHL member portal after short delay
setTimeout(function() {
  window.location.href = 'https://app.clientclub.net/login/1536RWoNvoGBX0aNtJE8';
}, 2000);
</script>
</body>
</html>
