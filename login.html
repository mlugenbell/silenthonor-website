<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Login — Silent Honor Foundation</title>
<link rel="stylesheet" href="css/global.css">
<style>
.login-wrapper {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  padding-top: 100px;
  position: relative;
  z-index: 1;
}

.login-card {
  background: rgba(17, 24, 39, 0.95);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 3rem;
  max-width: 480px;
  width: 100%;
}

.login-logo {
  display: flex;
  justify-content: center;
  margin-bottom: 2rem;
}

.login-logo img {
  height: 80px;
  width: auto;
}

.login-title {
  font-family: 'Oswald', sans-serif;
  font-size: 1.8rem;
  font-weight: 700;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 0.5rem;
}

.login-subtitle {
  font-family: 'Lora', serif;
  font-size: 0.95rem;
  font-style: italic;
  color: var(--muted);
  text-align: center;
  margin-bottom: 2rem;
  line-height: 1.6;
}

.login-divider {
  display: flex;
  align-items: center;
  gap: 1rem;
  margin: 1.5rem 0;
}

.login-divider::before,
.login-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.login-divider span {
  font-family: 'Oswald', sans-serif;
  font-size: 0.65rem;
  font-weight: 600;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}

.ghl-login-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  background: var(--red);
  color: var(--white);
  font-family: 'Oswald', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  padding: 18px 28px;
  border: none;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
}

.ghl-login-btn:hover {
  background: var(--red-light);
  transform: translateY(-1px);
}

.ghl-login-btn svg {
  width: 20px;
  height: 20px;
}

.login-info {
  background: rgba(185, 28, 28, 0.08);
  border: 1px solid rgba(185, 28, 28, 0.2);
  border-left: 3px solid var(--red);
  padding: 1rem 1.2rem;
  margin-top: 1.5rem;
}

.login-info-title {
  font-family: 'Oswald', sans-serif;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--red-light);
  margin-bottom: 0.4rem;
}

.login-info-text {
  font-size: 0.85rem;
  color: var(--muted);
  line-height: 1.5;
}

.login-footer {
  text-align: center;
  margin-top: 2rem;
  padding-top: 1.5rem;
  border-top: 1px solid var(--border);
}

.login-footer-text {
  font-size: 0.85rem;
  color: var(--muted);
}

.login-footer-link {
  color: var(--red-light);
  text-decoration: none;
  font-weight: 500;
}

.login-footer-link:hover {
  text-decoration: underline;
}

@media (max-width: 640px) {
  .login-card {
    padding: 2rem 1.5rem;
  }
}
</style>
</head>
<body>
<div class="topo-bg"><svg xmlns="http://www.w3.org/2000/svg"></svg></div>
<div id="nav-placeholder"></div>

<div class="login-wrapper page-content">
  <div class="login-card">
    <div class="login-logo">
      <img src="https://customer-assets.emergentagent.com/job_build-launch-21/artifacts/wdtk8u6d_Silent_Honor_Logo_16x9_transparent.png" alt="Silent Honor Foundation">
    </div>
    
    <h1 class="login-title">Member Portal</h1>
    <p class="login-subtitle">Access your courses, track your progress, and connect with the Silent Honor community.</p>

    <a href="https://app.clientclub.net/login/1536RWoNvoGBX0aNtJE8" target="_blank" class="ghl-login-btn" data-testid="member-login-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Access Member Portal
    </a>

    <div class="login-info">
      <div class="login-info-title">First Time Here?</div>
      <div class="login-info-text">If you haven't created an account yet, you'll be able to sign up through the member portal. It's free for all verified veterans.</div>
    </div>

    <div class="login-footer">
      <p class="login-footer-text">
        Need help? <a href="contact.html" class="login-footer-link">Contact Support</a>
      </p>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="js/components.js"></script>
<script src="js/main.js"></script>
</body>
</html>
